<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Custom Calendar Viewer</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-muted: #8e8e93; --accent: #0a84ff; --border: #2c2c2e; --segment-bg: #111112; --text-scale: 1.0; --cal-yellow: rgba(255, 214, 10, 0.25); --cal-yellow-text: #ffd60a; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; }
        .view-pane { display: flex; flex-direction: column; height: 100%; }
        .view-pane.hidden { display: none !important; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        #calendar-display { flex: 1; position: relative; overflow-y: auto; }
        
        /* Month Grid with Overlay Engine */
        .month-view-container { position: relative; height: 100%; width: 100%; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: auto repeat(5, 1fr); gap: 1px; background: var(--border); height: 100%; }
        .grid-cell { background: #000000; padding: 2px; position: relative; }
        
        /* Stacking Engine Classes */
        .continuous-banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: auto repeat(5, 1fr); gap: 1px; }
        .continuous-banner-item { pointer-events: auto; z-index: 10; cursor: pointer; font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; background: var(--cal-yellow); color: var(--cal-yellow-text); white-space: nowrap; overflow: hidden; margin: 0 1px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--card-bg); padding: 20px; border-radius: 14px; width: 300px; }
    </style>
</head>
<body>
    <div id="agenda-pane" class="view-pane">
        <header>
            <h1 id="current-date-title">May 2026</h1>
            <button onclick="toggleView('settings-pane')">Settings</button>
        </header>
        <div id="calendar-display"></div>
    </div>

    <div id="settings-pane" class="view-pane hidden">
        <header><h1>Settings</h1><button onclick="toggleView('agenda-pane')">Back</button></header>
    </div>

    <div id="detail-modal" class="modal-overlay" onclick="closeEventDetail()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-event-title">Event</h2>
            <button onclick="closeEventDetail()">Close</button>
        </div>
    </div>

    <script>
        var hardcodedEvents = [
            { id: 2, startDay: 1, endDay: 3, title: 'Visitors coming', type: 'evt-banner' },
            { id: 19, startDay: 17, endDay: 31, title: 'Mom coming', type: 'evt-banner' }
        ];

        function updateCalendarUI() {
            var container = document.getElementById('calendar-display');
            container.innerHTML = '';
            
            let grid = document.createElement('div');
            grid.className = 'month-grid';
            for(let i=0; i<35; i++) {
                let cell = document.createElement('div');
                cell.className = 'grid-cell';
                grid.appendChild(cell);
            }
            container.appendChild(grid);

            // STACKING ENGINE
            let overlay = document.createElement('div');
            overlay.className = 'continuous-banner-overlay';
            let trackOccupancy = {}; 

            hardcodedEvents.filter(e => e.type === 'evt-banner').forEach(e => {
                let sRow = Math.floor((e.startDay-1)/7) + 2;
                let eRow = Math.floor((e.endDay-1)/7) + 2;
                
                for(let r=sRow; r<=eRow; r++) {
                    if(!trackOccupancy[r]) trackOccupancy[r] = [];
                    let t = 0; while(trackOccupancy[r][t]) t++;
                    trackOccupancy[r][t] = true;
                    
                    let item = document.createElement('div');
                    item.className = 'continuous-banner-item';
                    item.style.gridRow = r;
                    item.style.gridColumn = `${((e.startDay-1)%7)+1} / ${((e.endDay-1)%7)+2}`;
                    item.style.marginTop = (t * 18 + 5) + 'px'; 
                    item.innerText = e.title;
                    item.onclick = () => openEventDetail(e);
                    overlay.appendChild(item);
                }
            });
            container.appendChild(overlay);
        }

        function openEventDetail(e) {
            document.getElementById('modal-event-title').innerText = e.title;
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeEventDetail() { document.getElementById('detail-modal').classList.remove('active'); }
        function toggleView(id) { document.querySelectorAll('.view-pane').forEach(p => p.classList.toggle('hidden', p.id !== id)); }
        
        window.onload = updateCalendarUI;
    </script>
</body>
</html>
